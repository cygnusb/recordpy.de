services:
  wetterrekord:
    build: .
    image: wetterrekord
    restart: unless-stopped
    ports:
      # nur localhost: der Dienst gehört hinter einen Reverse Proxy (TLS, HSTS)
      - "127.0.0.1:8000:8000"
    volumes:
      - wetterrekord-data:/data
    environment:
      WETTERREKORD_LIVE_POLL_MINUTES: "15"
      WETTERREKORD_INGEST_HOUR: "4"

volumes:
  wetterrekord-data:
